# ============================================================
#  netlify.toml — Configuration Netlify pour le site GTA
# ============================================================

[build]
  # Dossier source du site (racine du projet)
  publish = "."
  # Dossier où se trouvent les Netlify Functions
  functions = "netlify/functions"

# Redirige /api/* vers les Netlify Functions
# sans exposer /.netlify/functions/ dans l'URL publique
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# En-têtes de sécurité globaux (bonne pratique)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
